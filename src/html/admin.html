
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VoteVault - Admin Portal</title>
  <link rel="stylesheet" type="text/css" href="../css/admin.css">
</head>
<body>
  <div id="head" style="width: 100%; text-align: center; margin-bottom: 2rem;">
    <h1 style="margin: 0;">🎛️ Admin Dashboard</h1>
  </div>

  <div class="container">
    <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem;">
      <span style="font-size: 1.5rem;">➕</span>
      <legend style="font-size: 1.25rem; font-weight: 700; color: #333; margin: 0;">Add Candidate</legend>
    </div>
    <table class="table">
      <tbody>
        <tr>
          <td colspan="2">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
              <div style="text-align: left;">
                <label for="name" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #333;">👤 Candidate Name</label>
                <input id="name" type="text" name="name" placeholder="Enter candidate name" required>
              </div>
              <div style="text-align: left;">
                <label for="party" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #333;">🏛️ Platform</label>
                <input id="party" type="text" name="party" placeholder="Enter platform name" required>
              </div>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
    <input id="addCandidate" type="submit" name="submit" value="✓ Add Candidate">
    <p id="Aday"></p>
  </div>

  <div class="container">
    <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem;">
      <span style="font-size: 1.5rem;">📅</span>
      <legend style="font-size: 1.25rem; font-weight: 700; color: #333; margin: 0;">Set Voting Period</legend>
    </div>
    <table class="table">
      <tbody>
        <tr>
          <td colspan="2">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
              <div style="text-align: left;">
                <label for="startDate" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #333;">🚀 Start Date</label>
                <input id="startDate" type="date" name="startDate" required>
              </div>
              <div style="text-align: left;">
                <label for="endDate" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #333;">🏁 End Date</label>
                <input id="endDate" type="date" name="endDate" required>
              </div>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
    <input id="addDate" type="submit" name="submit" value="✓ Set Voting Dates">
    <p id="Aday"></p>
  </div>

  <div id="account" style="width: 100%; max-width: 900px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 1.5rem; border-radius: 12px; color: white; margin-bottom: 1.5rem; box-shadow: 0 8px 25px rgba(102, 126, 234, 0.35);">
    <p id="accountAddress" style="font-size: 0.9rem; font-weight: 600; margin: 0;">🌍 Admin Wallet: Connecting...</p>
    <p style="margin: 0.5rem 0 0; font-size: 0.9rem; opacity: 0.9;">Voting Period: <span id="dates" style="font-weight: 700;">Not set</span></p>
    <div id="msg" style="color: #fbbf24; font-weight: 600; font-size: 0.9rem; margin-top: 1rem;"></div>
  </div>

  <div class="container" style="margin-top: 1.5rem;">
    <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem;">
      <span style="font-size: 1.5rem;">📊</span>
      <h2 style="color: #333; margin: 0; font-size: 1.25rem;">Candidates Results</h2>
    </div>
    <table class="table">
      <thead>
        <tr>
          <th>👤 Name</th>
          <th>🏛️ Platform</th>
          <th>📈 Total Votes</th>
        </tr>
      </thead>
      <tbody id="boxCandidate"></tbody>
    </table>
  </div>

  <script src="/vendor/freighter-api.js"></script>
  <script src="../js/animations.js"></script>
  <script src="../js/app.js" type="module"></script>
</body>
</html>
