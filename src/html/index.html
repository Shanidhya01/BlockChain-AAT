
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VoteVault - Cast Your Vote</title>
  <link rel="stylesheet" type="text/css" href="../css/index.css">
</head>
<body>
  <div id="head" style="width: 100%; text-align: center; margin-bottom: 2rem;">
    <h1 style="margin: 0 0 0.5rem;">⚖️ Election Center</h1>
    <h2 style="color: #e0e7ff; margin: 0 0 1rem; font-size: 1.1rem; font-weight: 500;">Cast your vote securely on the Stellar blockchain</h2>
    <h3 style="color: #e0e7ff; margin: 0; font-size: 0.95rem; font-weight: 400;">Voting Period: <span id="dates" style="font-weight: 700; background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">Not scheduled yet</span></h3>
  </div>

  <div id="account" style="width: 100%; max-width: 900px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 1rem 1.5rem; border-radius: 12px; color: white; margin-bottom: 2rem; box-shadow: 0 8px 25px rgba(102, 126, 234, 0.35);">
    <p style="font-size: 0.85rem; margin: 0 0 0.5rem; opacity: 0.9;">🌍 Connected Stellar Wallet</p>
    <p id="accountAddress" style="font-size: 0.95rem; font-weight: 600; margin: 0; font-family: monospace; word-break: break-all;">Connecting...</p>
  </div>

  <div id="candidate" class="container">
    <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem;">
      <span style="font-size: 1.5rem;">🗳️</span>
      <h2 style="margin: 0; color: #333;">Candidates</h2>
    </div>
    <table class="table">
      <thead>
        <tr>
          <th>✓ Select</th>
          <th>👤 Name</th>
          <th>🏛️ Platform</th>
          <th>📊 Votes</th>
        </tr>
      </thead>
      <tbody id="boxCandidate"></tbody>
    </table>

    <div id="vote" style="text-align: center;">
      <p style="color: #666; margin-bottom: 1.5rem; font-size: 0.95rem;">Select your preferred candidate and click the Vote button to cast your secure ballot.</p>
      <button id="voteButton" onclick="App.vote()" disabled style="display: none;">Cast Vote</button>
      <div id="msg" style="color: #667eea; font-weight: 600; font-size: 0.95rem; margin-top: 1rem;"></div>
    </div>
  </div>

  <script src="/vendor/freighter-api.js"></script>
  <script src="../js/animations.js"></script>
  <script src="../js/freighter.js"></script>
  <script src="../js/app.js" type="module"></script>
</body>
</html>
